name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4
      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.24.5
      - name: Versao do Flutter
        run: flutter --version
      - name: Gerar plataforma android
        run: flutter create --project-name cm_fx --platforms=android .
      - name: Dependencias
        run: flutter pub get
      - name: Build APK
        run: flutter build apk --release
      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: cm-fx-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
